<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jarvis AI</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:Arial;
}

.container{
text-align:center;
}

.circle{

width:220px;
height:220px;

border:5px solid cyan;
border-radius:50%;

box-shadow:0 0 40px cyan;

animation:pulse 2s infinite;

display:flex;
justify-content:center;
align-items:center;

position:relative;
}

.inner{

width:120px;
height:120px;

border:3px solid cyan;
border-radius:50%;

animation:rotate 5s linear infinite;
}

.wave{

position:absolute;
bottom:-100px;

display:flex;
gap:8px;
}

.bar{

width:10px;
height:30px;
background:cyan;

border-radius:20px;

animation:wave 1s infinite;
}

.bar:nth-child(2){
animation-delay:0.1s;
}

.bar:nth-child(3){
animation-delay:0.2s;
}

.bar:nth-child(4){
animation-delay:0.3s;
}

.bar:nth-child(5){
animation-delay:0.4s;
}

h1{
color:cyan;
margin-top:120px;
letter-spacing:6px;
text-shadow:0 0 20px cyan;
}

@keyframes rotate{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

@keyframes wave{

0%,100%{
transform:scaleY(1);
}

50%{
transform:scaleY(3);
}

}

</style>

</head>

<body>

<div class="container">

<div class="circle">

<div class="inner"></div>

<div class="wave">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

</div>

<h1>JARVIS</h1>

</div>

</body>

</html>
